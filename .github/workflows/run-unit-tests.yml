name: "Run unit tests"

on:
  workflow_dispatch:
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Generate test ED25519 key
        run: |
          TEST_KEY=$(ruby -e "require 'openssl'; require 'base64'; k = OpenSSL::PKey.generate_key('ED25519'); print Base64.strict_encode64(k.private_to_pem)")
          echo "ED25519_PRIVATE_KEY=$TEST_KEY" >> $GITHUB_ENV

      - name: Run tests
        run: bundle exec rails test
